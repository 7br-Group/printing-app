name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget curl

      - name: Copy project files to mobile_app
        run: |
          cp -r web_app mobile_app/web_app
          cp -r whatsapp_server mobile_app/whatsapp_server
          cp printing_app.db mobile_app/printing_app.db

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer
          python -m buildozer --help

      - name: Build APK with Buildozer
        shell: bash
        run: |
          set +e
          cd "$GITHUB_WORKSPACE/mobile_app"
          pwd
          ls -la buildozer.spec
          python -m buildozer android debug 2>&1 | tee buildozer-output.log
          echo "DONE"
