name: 🤖 Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget curl

      # ── Prepare build directory ──
      - name: Copy project files to mobile_app
        run: |
          cp -r web_app mobile_app/web_app
          cp -r whatsapp_server mobile_app/whatsapp_server
          cp printing_app.db mobile_app/printing_app.db

      # ── Install Python deps ──
      - name: Install Buildozer + Cython
        run: |
          python --version
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer
          python -m buildozer --help

      # ── Compile WhatsApp server ──
      - name: Compile WhatsApp server with pkg
        working-directory: mobile_app/whatsapp_server
        run: |
          npm install
          sudo npm install -g pkg
          npx pkg server.js --target node18-linux-arm64 --output whatsapp-server 2>&1
          ls -lh whatsapp-server
          chmod +x whatsapp-server

      # ── Generate splash & icon ──
      - name: Generate icons
        working-directory: mobile_app
        run: |
          python -c "
          import struct, zlib
          def make_png(w, h, r, g, b):
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      cy = y / h
                      raw += struct.pack('BBBB', int(r*(1-cy*0.3)), int(g*(1-cy*0.3)), int(b*(1-cy*0.3)), 255)
              comp = zlib.compress(raw)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)
              def chunk(t, d):
                  c = t + d
                  return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              return sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', comp) + chunk(b'IEND', b'')
          for name, sz in [('splash.png', 512), ('icon.png', 192)]:
              with open(name, 'wb') as f: f.write(make_png(sz, sz, 59, 130, 246))
          print('Generated icons')
          "

      # ── Build APK ──
      - name: Build APK with Buildozer
        working-directory: mobile_app
        run: |
          echo "Python: $(python --version)"
          echo "Java: $(java -version 2>&1)"
          echo "Building APK... (30-40 min)"
          python -m buildozer android debug 2>&1

      # ── Upload ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: printing-app-apk
          path: mobile_app/bin/*.apk
          retention-days: 90
          if-no-files-found: error
