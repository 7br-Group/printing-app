<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>نظام إدارة المطبعة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        {% if session.logged_in %}
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h5><i class="bi bi-printer"></i> نظام المطبعة</h5>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{{ url_for('dashboard') }}">
                        <i class="bi bi-speedometer2"></i> لوحة التحكم
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/products' in request.path %}active{% endif %}" href="{{ url_for('products') }}">
                        <i class="bi bi-box"></i> المنتجات
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/inventory' in request.path %}active{% endif %}" href="{{ url_for('inventory') }}">
                        <i class="bi bi-clipboard-data"></i> المخزون
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/customers' in request.path %}active{% endif %}" href="{{ url_for('customers') }}">
                        <i class="bi bi-people"></i> العملاء
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/inquiries' in request.path %}active{% endif %}" href="{{ url_for('inquiries') }}">
                        <i class="bi bi-chat-dots"></i> الاستفسارات
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/sales' in request.path %}active{% endif %}" href="{{ url_for('sales') }}">
                        <i class="bi bi-cart"></i> المبيعات
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/settings' in request.path %}active{% endif %}" href="{{ url_for('settings') }}">
                        <i class="bi bi-gear"></i> الإعدادات
                    </a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                        <i class="bi bi-box-arrow-right"></i> خروج
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer" id="waStatus">
                <small class="text-muted"><i class="bi bi-whatsapp"></i> واتساب: <span class="text-danger">❌ غير متصل</span></small>
            </div>
        </div>
        {% endif %}
        <div class="content flex-grow-1" id="content">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // Check WhatsApp status every 10 seconds
        {% if session.logged_in %}
        setInterval(async () => {
            try {
                const res = await axios.get('/api/whatsapp/status');
                const el = document.querySelector('#waStatus span');
                if (res.data.connected) {
                    el.className = 'text-success';
                    el.innerHTML = '✅ متصل';
                } else {
                    el.className = 'text-danger';
                    el.innerHTML = '❌ غير متصل';
                }
            } catch(e) {}
        }, 10000);
        {% endif %}
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
