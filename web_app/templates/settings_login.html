{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock fs-1 text-warning"></i>
                        <h4>الإعدادات محمية</h4>
                        <p class="text-muted">أدخل كلمة مرور الإعدادات للدخول</p>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">كلمة مرور الإعدادات</label>
                            <input type="password" name="password" class="form-control" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">دخول</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('dashboard') }}" class="text-muted">العودة للوحة التحكم</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
